version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-taskflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-taskflow_secret}
      POSTGRES_DB: ${DB_NAME:-taskflow}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-taskflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-taskflow}
      DB_PASSWORD: ${DB_PASSWORD:-taskflow_secret}
      DB_NAME: ${DB_NAME:-taskflow}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_please_use_a_long_random_string}
      PORT: 8080
    ports:
      - "8080:8080"

  app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  pgdata:
